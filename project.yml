name: DeskBoard

options:
  bundleIdPrefix: com.deskboard
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.2"
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 4
  tabWidth: 4
  generateEmptyDirectories: true
  transitivelyLinkDependencies: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_BITCODE: false
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_STRICT_CONCURRENCY: complete
    OTHER_SWIFT_FLAGS: -warn-concurrency
    CLANG_ENABLE_MODULE_DEBUGGING: NO

packages:
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"

targets:
  DeskBoard:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/DeskBoard
        createIntermediateGroups: true
      - path: Resources
        type: folder
        buildPhase: none
        excludes:
          - "**/.DS_Store"
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: DeskBoard
        CFBundleVersion: "12"
        CFBundleShortVersionString: "1.0.0"
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSLocalNetworkUsageDescription: "DeskBoard uses your local network to discover and communicate with nearby devices."
        NSCameraUsageDescription: "DeskBoard needs camera access to scan QR codes for device pairing."
        NSBonjourServices:
          - "_deskboard-v1._tcp"
          - "_deskboard-v1._udp"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.deskboard.connection-keepalive
        NSAppleMusicUsageDescription: "DeskBoard needs media library access to control music playback on this device."
        ITSAppUsesNonExemptEncryption: false
    preBuildScripts:
      - script: |
          ICON="${SRCROOT}/Resources/Assets.xcassets/AppIcon.appiconset/icon.png"
          DEST="${SRCROOT}/Resources/Assets.xcassets/AppIcon.appiconset"
          if [ ! -f "$ICON" ] && [ -f "${SRCROOT}/DeckBoard/Assets.xcassets/AppIcon.appiconset/icon.png" ]; then
            ICON="${SRCROOT}/DeckBoard/Assets.xcassets/AppIcon.appiconset/icon.png"
            cp "$ICON" "$DEST/icon.png"
          fi
          if [ -f "$ICON" ]; then
            sips -z 40 40 "$ICON" --out "$DEST/icon-20@2x.png" 2>/dev/null || true
            sips -z 60 60 "$ICON" --out "$DEST/icon-20@3x.png" 2>/dev/null || true
            sips -z 58 58 "$ICON" --out "$DEST/icon-29@2x.png" 2>/dev/null || true
            sips -z 87 87 "$ICON" --out "$DEST/icon-29@3x.png" 2>/dev/null || true
            sips -z 80 80 "$ICON" --out "$DEST/icon-40@2x.png" 2>/dev/null || true
            sips -z 120 120 "$ICON" --out "$DEST/icon-40@3x.png" 2>/dev/null || true
            sips -z 120 120 "$ICON" --out "$DEST/icon-60@2x.png" 2>/dev/null || true
            sips -z 180 180 "$ICON" --out "$DEST/icon-60@3x.png" 2>/dev/null || true
            sips -z 20 20 "$ICON" --out "$DEST/icon-20.png" 2>/dev/null || true
            sips -z 29 29 "$ICON" --out "$DEST/icon-29.png" 2>/dev/null || true
            sips -z 40 40 "$ICON" --out "$DEST/icon-40.png" 2>/dev/null || true
            sips -z 76 76 "$ICON" --out "$DEST/icon-76.png" 2>/dev/null || true
            sips -z 152 152 "$ICON" --out "$DEST/icon-76@2x.png" 2>/dev/null || true
            sips -z 167 167 "$ICON" --out "$DEST/icon-83.5@2x.png" 2>/dev/null || true
            sips -z 1024 1024 "$ICON" --out "$DEST/icon-1024.png" 2>/dev/null || true
          fi
        name: Generate App Icons
    resources:
      - Resources/Assets.xcassets
      - Resources/Localizable.strings
    dependencies:
      - package: KeychainAccess
      - sdk: MultipeerConnectivity.framework
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/DeskBoard/App/DeskBoard.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.deskboard.app
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: $(PROVISIONING_PROFILE_SPECIFIER)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: iPhone Developer
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          CODE_SIGN_IDENTITY: iPhone Distribution
          SWIFT_OPTIMIZATION_LEVEL: "-Osize"
          VALIDATE_PRODUCT: true

  DeskBoardTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Tests/DeskBoardTests
    dependencies:
      - target: DeskBoard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deskboard.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/DeskBoard.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DeskBoard
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  DeskBoard:
    build:
      targets:
        DeskBoard: all
        DeskBoardTests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: IS_TESTING
          value: false
          isEnabled: false
    test:
      config: Debug
      targets:
        - DeskBoardTests
      coverageTargets:
        - DeskBoard
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
      customArchiveName: DeskBoard
