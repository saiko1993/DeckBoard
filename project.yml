name: DeskBoard

options:
  bundleIdPrefix: com.deskboard
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.2"
  createIntermediateGroups: true
  usesTabs: false
  indentWidth: 4
  tabWidth: 4
  generateEmptyDirectories: true
  transitivelyLinkDependencies: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_BITCODE: false
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_STRICT_CONCURRENCY: complete
    OTHER_SWIFT_FLAGS: -warn-concurrency
    CLANG_ENABLE_MODULE_DEBUGGING: NO

packages:
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    from: "4.2.2"

targets:
  DeskBoard:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/DeskBoard
        createIntermediateGroups: true
      - path: Resources
        type: folder
        buildPhase: none
        excludes:
          - "**/.DS_Store"
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: DeskBoard
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSLocalNetworkUsageDescription: "DeskBoard uses your local network to discover and communicate with nearby devices."
        NSCameraUsageDescription: "DeskBoard needs camera access to scan QR codes for device pairing."
        NSBonjourServices:
          - "_deskboard-v1._tcp"
          - "_deskboard-v1._udp"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - fetch
        ITSAppUsesNonExemptEncryption: false
    resources:
      - Resources/Assets.xcassets
      - Resources/Localizable.strings
    dependencies:
      - package: KeychainAccess
      - sdk: MultipeerConnectivity.framework
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/DeskBoard/App/DeskBoard.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.deskboard.app
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: $(PROVISIONING_PROFILE_SPECIFIER)
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          CODE_SIGN_IDENTITY: iPhone Developer
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          CODE_SIGN_IDENTITY: iPhone Distribution
          SWIFT_OPTIMIZATION_LEVEL: "-Osize"
          VALIDATE_PRODUCT: true

  DeskBoardTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Tests/DeskBoardTests
    dependencies:
      - target: DeskBoard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deskboard.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/DeskBoard.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/DeskBoard
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  DeskBoard:
    build:
      targets:
        DeskBoard: all
        DeskBoardTests: [test]
    run:
      config: Debug
      environmentVariables:
        - variable: IS_TESTING
          value: false
          isEnabled: false
    test:
      config: Debug
      targets:
        - DeskBoardTests
      coverageTargets:
        - DeskBoard
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
      customArchiveName: DeskBoard